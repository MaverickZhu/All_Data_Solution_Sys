version: '3.8'

services:
  # Redis - 项目专用缓存数据库
  multimodal_redis:
    image: redis:7-alpine
    container_name: multimodal_redis
    ports:
      - "6380:6379"  # 使用6380端口避免冲突
    command: redis-server --appendonly yes --requirepass multimodal123
    volumes:
      - multimodal_redis_data:/data
    networks:
      - multimodal_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "multimodal123", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL - 项目专用（如果需要）
  multimodal_postgres:
    image: postgres:16-alpine
    container_name: multimodal_postgres
    ports:
      - "5433:5432"  # 使用5433端口避免冲突
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: multimodal123
      POSTGRES_DB: multimodal_analysis
    volumes:
      - multimodal_postgres_data:/var/lib/postgresql/data
    networks:
      - multimodal_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  multimodal_redis_data:
  multimodal_postgres_data:

networks:
  multimodal_network:
    driver: bridge 