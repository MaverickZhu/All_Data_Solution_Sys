version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg14
    container_name: multimodal_postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: multimodal_analysis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d multimodal_analysis"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - multimodal_network

  multimodal_redis:
    image: redis:latest
    container_name: multimodal_redis
    ports:
      - "6380:6379"
    command: redis-server --requirepass multimodal123
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "multimodal123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - multimodal_network

  backend:
    build:
      context: ..
      dockerfile: ./Dockerfile
    command: sh -c "uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    working_dir: /app/backend
    volumes:
      - ../backend:/app/backend
      - ../logs:/app/logs
      - ../.env:/app/.env
    ports:
      - "8008:8000"
    depends_on:
      postgres:
        condition: service_healthy
      multimodal_redis:
        condition: service_healthy
    networks:
      - multimodal_network
    env_file:
      - ../.env
    environment:
      - APP_ENV=docker

  celery-worker:
    build:
      context: ..
      dockerfile: ./Dockerfile
    command: sh -c "celery -A main.celery_worker worker --loglevel=info"
    working_dir: /app/backend
    volumes:
      - ../backend:/app/backend
      - ../logs:/app/logs
      - ../.env:/app/.env
    depends_on:
      postgres:
        condition: service_healthy
      multimodal_redis:
        condition: service_healthy
    networks:
      - multimodal_network

networks:
  multimodal_network:
    driver: bridge
